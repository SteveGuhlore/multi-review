name: release
on:
  # Manual publish: pick a version, the job creates the tag + GitHub Release.
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g. v0.2.0)"
        required: true
        default: v0.2.0
  # Future-proof: pushing a vX.Y.Z tag also publishes a Release.
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Gate the release on the same deterministic spine CI uses.
      - name: Unit tests
        run: npm test
      - name: /goal gate ladder
        run: node goal.mjs --gates-only
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create tag + GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
            exit 0
          fi
          # gh creates the tag at the checked-out SHA if it doesn't exist yet.
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes
